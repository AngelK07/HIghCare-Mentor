<!DOCTYPE html>
<html lang="en">
<head>
    <title>HCM Quiz</title>
    <link rel="stylesheet" href="../css/front.css">
</head>
<body>

<div class="topbar">
    <div class="left">
        <img src="../assets/web logo1.png" class="logo-small" alt="logo">
        <span id="qno"></span>
    </div>
    <div id="timer" class="timer"></div>
</div>

<div class="main">

    <div class="question-box">
        <h2 id="question"></h2>

        <div id="options"></div>

        <div class="nav">
            <button onclick="prevQ()" class="btn-outline">Previous</button>
            <button id="nextBtn" onclick="nextQ()" class="btn-main">Next</button>
        </div>
    </div>

    <div class="palette" id="palette"></div>

</div>

<button class="floating" onclick="togglePalette()">Q</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/quiz.js"></script>

</body>
</html>
